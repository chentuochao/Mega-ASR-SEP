# Example config for the per-region training-mode mechanism (see
# arguments.py's --ft_params, modeling.py's parse_ft_params/apply_train_mode).
# Run with:
#   bash scripts/finetune_new.sh scripts/configs/example_ft_params.yaml
# (finetune_encoder.sh/finetune_fusion.sh both accept it too -- ft_params
# supersedes their --use_lora/--freeze_llm/--lora_scope/--lr_encoder/
# --lr_aligner/--lr_llm flags whenever it's set, regardless of which script
# you launch from; finetune_new.sh is the one that REQUIRES it.)
#
# Every region in {encoder, fusion, aligner, llm} must be listed, each with:
#   ft_mode: freeze | lora | full
#   lr: <float>            (ignored for ft_mode: freeze, but still required)
#   lora_r / lora_alpha     (only used when ft_mode: lora; default 16 / 32)
#
# "fusion" (fusion_gate / conv2d1_mix / cond_proj+film_proj+layer_gates /
# cross_attn, depending on FUSION_MODE) can't be ft_mode: lora -- those
# params have no pretrained base weight to low-rank-adapt, they're created
# fresh at init. Use freeze or full for it.
#
# --lora_dropout/--lora_bias (CLI flags, not part of this block) stay global
# across every "lora" region -- PEFT has no per-region override for those two,
# only for r/alpha (rank_pattern/alpha_pattern under the hood).
#
# model_path/run_dir below are optional -- omit either to fall back to the
# script's own hardcoded default (see finetune_new.sh). An explicit env var
# (MODEL_PATH=... / RUN_DIR=...) still wins over both.
model_path: /home/ubuntu/Hearvana/Scripts/Mega-ASR/ckpt/Mega-ASR/Qwen3-ASR-1.7B
run_dir: /home/ubuntu/Hearvana/datasets/Results_ASR
run_name: example_ft_params_cleanmask_crossatten
fusion_mode: cross_attn
collator: white_noise_test
train_jsonl: "/home/ubuntu/Hearvana/datasets/qwen3_fine_tuning_datasets/Mix_Qwen_ASR_dataset/train_clean.jsonl"
val_jsonl: "/home/ubuntu/Hearvana/datasets/qwen3_fine_tuning_datasets/Mix_Qwen_ASR_dataset/val_clean.jsonl"
batch_size: 8
grad_acc: 8
epochs: 6
save_steps: 200
language: English
report_to: none

ft_params:
  encoder:
    ft_mode: full
    lr: 1e-5
  fusion:
    ft_mode: full
    lr: 1e-5
  aligner:
    ft_mode: full
    lr: 1e-5
  llm:
    ft_mode: freeze
    lr: 1e-5
